name: Reapax News Aggregator

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Run aggregator
        run: python aggregator.py

      - name: Commit news.json to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add news.json
          git commit -m "Update news.json $(date -u +%Y-%m-%d_%H:%M)" || echo "No changes"
          git push
```

**Commit changes.**

**Steg 2: Uppdatera frontend**

Vi behöver ändra en rad i `index.html` på Hostinger så den hämtar från GitHub istället.

1. Gå till **File Manager** → `/public_html/news/` → öppna `index.html`
2. Sök efter raden (Ctrl+F):
```
