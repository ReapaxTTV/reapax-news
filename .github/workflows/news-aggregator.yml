name: Reapax News Aggregator

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Run aggregator
        run: python aggregator.py

      - name: Debug - check file exists
        run: |
          echo "Files in current dir:"
          ls -la news.json
          echo "File size:"
          wc -c news.json

      - name: Upload news.json via lftp
        run: |
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:ssl-allow yes;
            open ${{ secrets.FTP_HOST }};
            user ${{ secrets.FTP_USER }} ${{ secrets.FTP_PASS }};
            cd /public_html/news;
            put news.json;
            ls;
            bye;
          "

      - name: Backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-${{ github.run_id }}
          path: news.json
          retention-days: 7
