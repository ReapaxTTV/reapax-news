name: Reapax News Aggregator

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Run aggregator
        run: python aggregator.py

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./
          server-dir: /public_html/news/
          include: '["news.json"]'
          dangerous-clean-slate: false

      - name: Backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-${{ github.run_id }}
          path: news.json
          retention-days: 7
