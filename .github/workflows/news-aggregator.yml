name: Reapax News Aggregator

on:
  schedule:
    - cron: '0 5 * * *'   # 07:00 CEST / 06:00 CET
    - cron: '0 17 * * *'  # 19:00 CEST / 18:00 CET
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Run aggregator
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_REMOTE_DIR: /public_html/news
          FTP_USE_TLS: 'true'
        run: python aggregator.py

      - name: Commit news.json to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "Update news.json"
          git push
