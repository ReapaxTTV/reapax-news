name: Reapax News Aggregator

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Run aggregator
        run: python aggregator.py

      - name: Upload news.json via curl FTP
        run: |
          curl -v --ftp-create-dirs \
            -T news.json \
            -u "${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}" \
            "ftp://${{ secrets.FTP_HOST }}/news/news.json"

      - name: Backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-${{ github.run_id }}
          path: news.json
          retention-days: 7
